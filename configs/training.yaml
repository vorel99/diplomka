target_variable: unemployment_unemployment_per_capita

feature_filtering:
  omit_features: [
    "unemployment_unemployment_total",
    "unemployment_unemployment_foreigners",
    "unemployment_unemployment_disabled",
    "unemployment_unemployment_15_20",
    "unemployment_unemployment_15_25",
    "unemployment_unemployment_55_65",
    "unemployment_unemployment_long_term",
  ]

train_test_split_ratio: 0.8
split_strategy: stratified_federal_state
federal_state_column: federal_state_id

random_state: 42

model:
  model_type: lightgbm

search:
  search_type: randomized
  n_iter: 80
  cv: 5
  refit_metric: r2
  param_grid:
    n_estimators: [300, 600, 1200]
    learning_rate: [0.01, 0.03, 0.05]
    max_depth: [2, 3, 4]
    num_leaves: [7, 15, 31]
    min_child_samples: [20, 50, 100, 200]
    min_split_gain: [0.0, 0.1, 0.5]
    feature_fraction: [0.6, 0.8, 1.0]
    bagging_fraction: [0.6, 0.8, 1.0]
    bagging_freq: [1, 5]
    reg_alpha: [0.0, 0.1, 1.0, 5.0]
    reg_lambda: [0.0, 0.1, 1.0, 5.0]

early_stopping:
  early_stopping_rounds: 100
  early_stopping_validation_fraction: 0.15