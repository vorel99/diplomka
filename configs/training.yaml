target_variable: unemployment_25_total

feature_filtering:
  omit_features: [
    "unemployment*",
  ]

train_test_split_ratio: 0.8
split_strategy: stratified_federal_state
federal_state_column: federal_state_id

random_state: 42

# model_type options: lightgbm (default), random_forest, gradient_boosting, xgboost, catboost
model:
  model_type: lightgbm

search:
  search_type: randomized
  n_iter: 80
  cv: 5
  refit_metric: r2
  param_grid:
    n_estimators: [300, 600, 1200]
    learning_rate: [0.01, 0.03, 0.05]
    max_depth: [2, 3, 4]
    num_leaves: [7, 15, 31]
    min_child_samples: [20, 50, 100, 200]
    min_split_gain: [0.0, 0.1, 0.5]
    feature_fraction: [0.6, 0.8, 1.0]
    bagging_fraction: [0.6, 0.8, 1.0]
    bagging_freq: [1, 5]
    reg_alpha: [0.0, 0.1, 1.0, 5.0]
    reg_lambda: [0.0, 0.1, 1.0, 5.0]


# alternative parameters for different models (uncomment to use)

#   model_type: random_forest
#   param_grid:
#     n_estimators: [100, 200, 500]
#     max_depth: [5, 10, null]
#     min_samples_split: [2, 5]

#   model_type: gradient_boosting
#   param_grid:
#     n_estimators: [100, 200]
#     max_depth: [2, 3, 5]
#     learning_rate: [0.05, 0.1, 0.2]

#   model_type: xgboost  # requires: pip install xgboost
#   param_grid:
#     n_estimators: [100, 200]
#     max_depth: [3, 6]
#     learning_rate: [0.05, 0.1]


early_stopping:
  early_stopping_rounds: 100
  early_stopping_validation_fraction: 0.15

# Stateful transforms: fitted on training data only, then applied to test data to avoid leakage
# These transforms learn from the data distribution (e.g., bin edges from quantiles)
stateful_transforms:
  - name: osm_atm_bin_per_capita
    class: KBinsDiscretizerBinning
    module: geoscore_de.data_flow.feature_engineering.kbins_binning
    input_columns: [osm_atm_atms_per_1000_residents]
    output_column: osm_atm_atms_per_1000_residents
    params:
      strategy: quantile
      n_bins: 10
  - name: osm_atm_bin_per_area
    class: KBinsDiscretizerBinning
    input_columns: [osm_atm_atm_density_per_km2]
    output_column: osm_atm_atm_density_per_km2
    params:
      strategy: quantile
      n_bins: 10
  - name: osm_tourist_bin_per_capita
    class: KBinsDiscretizerBinning
    input_columns: [osm_tourist_tourist_poi_per_1000_residents]
    output_column: osm_tourist_tourist_poi_per_1000_residents
    params:
      strategy: quantile
      n_bins: 10
